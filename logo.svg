<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="coral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F95C4B"/>
      <stop offset="100%" style="stop-color:#fb7d70"/>
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>

  <!-- Subtle coral orb in background -->
  <circle cx="280" cy="120" r="120" fill="#F95C4B" opacity="0.06"/>
  <circle cx="100" cy="300" r="80" fill="#F95C4B" opacity="0.04"/>

  <!-- "jams" text -->
  <text
    x="50"
    y="248"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="148"
    font-weight="900"
    letter-spacing="-8"
    fill="#ffffff"
  >jams</text>

  <!-- Coral dot -->
  <circle cx="342" cy="238" r="18" fill="url(#coral)" filter="url(#glow)"/>
</svg>
