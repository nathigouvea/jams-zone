<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <linearGradient id="coral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F95C4B"/>
      <stop offset="100%" style="stop-color:#fb7d70"/>
    </linearGradient>
    <radialGradient id="orb1" cx="70%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#F95C4B;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F95C4B;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#fb7d70;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#fb7d70;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1000" fill="#0A0A0F"/>

  <!-- Orb glows -->
  <rect width="1000" height="1000" fill="url(#orb1)"/>
  <rect width="1000" height="1000" fill="url(#orb2)"/>

  <!-- "j." monogram centered — for Instagram profile pic -->
  <text
    x="500"
    y="620"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="480"
    font-weight="900"
    letter-spacing="-20"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="auto"
  >j</text>

  <!-- Coral dot -->
  <circle cx="638" cy="558" r="52" fill="url(#coral)" filter="url(#glow)"/>

  <!-- "jams.zone" wordmark at bottom -->
  <text
    x="500"
    y="820"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="58"
    font-weight="600"
    letter-spacing="8"
    fill="rgba(255,255,255,0.35)"
    text-anchor="middle"
  >jams.zone</text>
</svg>
